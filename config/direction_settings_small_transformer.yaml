    ema_mid_column: ema_50
    ema_slow_column: ema_200
    slope_lookback_bars: 3
    adx_strong_level: 25.0
    min_adx_for_trend_signal: 12.0
    require_adx_for_trend_signal: false
    require_session_for_signals: false
    rsi_reversal_buy_max: 35.0
    rsi_reversal_sell_min: 65.0
    rsi_reversal_exit_level_buy: 45.0
    rsi_reversal_exit_level_sell: 55.0
    bollinger_reversion_z: 1.5
    donchian_period: 48
    volatility_z_window: 288
spread_control:
  enabled: true
  treat_zero_as_missing: true
  default_fallback_min_spread_points: 1.0
  fallback_min_spread_points:
    EURUSD: 1.0
    GBPUSD: 1.0
    USDJPY: 1.0
    USDCHF: 1.0
    USDCAD: 1.0
    AUDUSD: 1.0
    NZDUSD: 1.0
    EURJPY: 1.0
    GBPJPY: 1.0
    AUDJPY: 1.0
    CADJPY: 1.0
    CHFJPY: 1.0
    EURGBP: 1.0
    EURCHF: 1.0
    GBPCHF: 1.0
    GBPAUD: 1.0
    GBPCAD: 1.0
    EURAUD: 1.0
    EURCAD: 1.0
    AUDNZD: 1.0
    AUDCAD: 1.0
    AUDCHF: 1.0
    CADCHF: 1.0
    EURNZD: 1.0
    GBPNZD: 1.0
    NZDCAD: 1.0
    NZDCHF: 1.0
    NZDJPY: 1.0
    USDSGD: 1.0
    GBPSGD: 1.0
    SGDJPY: 1.0
spread_risk:
  config_path: generated_spread_risk.yaml
  percentile: 95
  min_valid_spread_points: 0.0
  max_valid_spread_points: null
labels:
  horizon_bars: 24
  take_profit_pips: 8.0
  stop_loss_pips: 5.0
  spread_column: spread_points
  spread_pips_per_point: 0.1
  default_spread_points: 2.0
  max_spread_pips: 4.0
  min_clean_win_net_pips: 3.0
  min_side_edge_pips: 2.5
  use_live_bid_ask_simulation: true
  entry_on_next_bar_open: true
  same_bar_tp_sl_policy: stop_first
  conservative_same_bar_hits: true
  slippage_pips: 0.1
  positive_label_deduplication:
    enabled: true
    mode: best_per_cluster
    min_gap_bars: 3
    discarded_positive_mode: ignore
  max_positive_setups_per_day:
    enabled: true
    buy: 100
    sell: 100
    rank_by: candidate_strength_score
    discarded_positive_mode: ignore
  method: strong_setup_v1
  strong_setup:
    output_mode: event_based
    random_seed: 43
    positive_defaults:
      require_tp_before_sl: true
      min_net_pips: 3.0
      min_mfe_pips: 10.0
      max_mae_pips: 4.0
      min_side_edge_pips: 2.0
      allow_clean_without_analytic: true
    positive:
      buy:
        min_net_pips: 3.0
        min_mfe_pips: 10.0
        max_mae_pips: 4.0
        min_side_edge_pips: 2.0
        min_analytic_score: null
        allow_clean_without_analytic: true
      sell:
        min_net_pips: 3.0
        min_mfe_pips: 10.0
        max_mae_pips: 4.0
        min_side_edge_pips: 1.5
        min_analytic_score: null
        allow_clean_without_analytic: true
    hard_negatives:
      enabled: true
      analytic_score_min: 4.0
      near_positive_mfe_fraction: 0.75
      max_ratio_to_positive: 2.0
    background_no_trade:
      enabled: true
      ratio_to_positive: 2.0
model:
  architecture: small_transformer_gate_direction_v1
  sequence_length: 64
  dropout: 0.05
  d_model: 64
  n_heads: 4
  num_layers: 2
  feedforward_dim: 128
  pooling: attention
  dense_dropout: 0.05
  dense_hidden_sizes:
  - 64
  - 32
  use_edge_pips_head: false
  edge_pips_scale: 12.0
  use_analytic_signal_agreement_head: false
training:
  date_start: null
  date_end: null
  seed: 43
  deterministic: true
  reseed_each_epoch: true
  epoch_seed_mode: base_plus_symbol_plus_epoch
  max_rows: null
  use_pregenerated_direction_data: true
  require_pregenerated_direction_data: true
  direction_data_dir: data/direction
  direction_data_template: '{symbol}_{timeframe}_direction_training.csv'
  save_epoch_models: true
  epoch_model_dir: epoch_checkpoints
  batch_size: 512
  epochs: 50
  learning_rate: 0.0005
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  val_fraction: 0.2
  train_validation_embargo_bars: 88
  auto_min_train_validation_embargo: true
  early_stopping_patience: 1000
  min_delta: 0.0001
  model_selection_metric: replay_score
  replay_each_epoch: false
  replay_start: '2025-03-01'
  replay_end: '2025-09-01'
  replay_output_dir: logs/training_replay_direction
  use_curriculum_sampler: true
  curriculum_sampler:
    enabled: true
    schedule: linear
    start_epoch: 1
    end_epoch: 50
    anchor_class: max_positive
    start_ratios:
      sell: 1.0
      no_trade: 3.0
      buy: 1.0
    end_ratios:
      sell: 1.0
      no_trade: 8.0
      buy: 1.0
    with_replacement:
      sell: true
      no_trade: false
      buy: true
    shuffle: true
  gate_loss_weight: 1.0
  side_direction_loss_weight: 1.0
  use_edge_pips_loss: false
  edge_pips_loss_weight: 0.0
  gate_pos_weight: 0.35
  side_direction_class_weights:
    sell: 1.0
    buy: 1.0
  use_analytic_signal_agreement_loss: false
  analytic_signal_agreement_loss_weight: 0.0
replay:
  eval_start: null
  eval_end: null
  output_dir: logs/direction_replay_epochs
  batch_size: 256
  min_direction_probability: 0.4
  min_trades_for_score: 20
  score_net_pips_weight: 1.0
  score_avg_pips_weight: 50.0
  score_win_rate_weight: 50.0
  score_drawdown_weight: 0.1
  min_trade_probability: 0.6
  min_edge_pips: null
direction_policy:
  enabled: true
  min_direction_probability: 0.4
  min_trade_probability: 0.6
  min_edge_pips: null
external_trade_filter:
  enabled: true
  max_spread_points: null
  use_ema_alignment: true
  use_ema200_filter: false
  min_adx: 12.0
  buy_max_rsi: 72.0
  sell_min_rsi: 28.0
  use_macd_hist_confirmation: false
  min_atr_14_norm: null
  max_atr_14_norm: null
  allowed_sessions: []
  news:
    enabled: false
    path: data/news_calendar.csv
    min_impact: high
    minutes_before: 30
    minutes_after: 30
risk:
  max_spread_points: 60
  max_trades_per_day: 3000
  max_symbol_trades_per_day: 96
  cooldown_bars: 3
  fixed_lot: 0.01
  max_daily_loss_percent_of_balance: 1.0
  daily_loss_include_open_positions: true
  daily_loss_fail_closed: true
  daily_loss_check_in_paper: false
execution:
  dry_run: false
  trading_enabled: true
  magic: 550120
  deviation: 20
  comment: direction_policy
  lot_size: 0.01
  min_lot: 0.01
  max_lot: 1.0
  lot_step: 0.01
  order_filling: IOC
mt5:
  enabled: true
  terminal_path: null
  login: null
  password: null
  server: null
  apply_broker_server_timezone_offset: true
  broker_server_utc_offset_hours: 3
m5_execution:
  use_closed_candle_only: true
  one_decision_per_symbol_per_m5_bar: true
  one_trade_per_symbol_per_m5_bar: true
  state_dir: logs/m5_bar_state
symbol_trade_modes:
  symbols:
    EURUSD: buy_sell
    AUDUSD: buy_sell
    USDCAD: buy_sell
    USDCHF: buy_sell
    GBPUSD: buy_sell
    USDJPY: buy_sell
orders:
  stop_loss_pips: 5.0
  take_profit_pips: 12.0
live_direction_policy:
  min_direction_probability: 0.4
  poll_seconds: 20
  bars: 800
  signals_csv: logs/live_direction_signals.csv
  model_path: models/small_transformer/{symbol}_{timeframe}_direction_policy.pt
  scaler_path: models/small_transformer/{symbol}_{timeframe}_direction_scaler.pkl
  features_path: models/small_transformer/{symbol}_{timeframe}_direction_features.json
  min_trade_probability: 0.6
  min_edge_pips: null
